

services:
  app:
    # Use pre-built image from GitHub Container Registry
    image: ghcr.io/anasoid/iptv-organizer-proxy:${APP_VERSION:-latest}
    container_name: iptv-organizer-proxy

    ports:
      - "${APP_PORT:-9090}:9090"
    volumes:
      - app-data:/app/data
      - app-logs:/logs
    environment:
      - APP_URL=http://192.168.8.1:9090
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - SYNC_CHECK_INTERVAL=${SYNC_CHECK_INTERVAL:-10800}
      - SYNC_LOCK_TIMEOUT=${SYNC_LOCK_TIMEOUT:-600}
      - PROXY_URL=http://mitmproxy:8080
      - PROXY_ENABLED=true
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mitmproxy:
    image: mitmproxy/mitmproxy
    command: mitmweb --web-host 0.0.0.0 --web-port 8081
    ports:
      - "9080:8080" # proxy
      - "9081:8081" # web UI

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local