# Docker Compose for IPTV Organizer Proxy
# Full stack: Quarkus Java backend + React admin panel + SQLite database
# Usage: docker-compose up --build

services:
  app:
    # Use APP_IMAGE_TAG=develop-full to switch to the full-driver image variant.
    image: ghcr.io/anasoid/iptv-organizer-proxy:${APP_IMAGE_TAG:-develop}
    container_name: iptv-organizer-proxy

    ports:
      - "${APP_PORT:-9080}:8080"

    environment:
      # Quarkus HTTP Configuration
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HTTP_HOST: 0.0.0.0

      # Database Configuration - SQLite
      QUARKUS_DATASOURCE_DB_KIND: other
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:sqlite:/app/data/app.sqlite"
      QUARKUS_DATASOURCE_USERNAME: ""
      QUARKUS_DATASOURCE_PASSWORD: ""

      # Native runtime memory tuning (RSS reduction)
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Dio.netty.allocator.maxOrder=4}"
      MALLOC_ARENA_MAX: "${MALLOC_ARENA_MAX:-2}"
      MALLOC_TRIM_THRESHOLD_: "${MALLOC_TRIM_THRESHOLD_:-131072}"

      # SQLite/JDBC memory knobs consumed by application.properties
      JDBC_MAX_POOL_SIZE: "${JDBC_MAX_POOL_SIZE:-2}"
      SQLITE_CACHE_SIZE: "${SQLITE_CACHE_SIZE:--1000}"

      # Proxy Configuration (optional)
      PROXY_URL: "${PROXY_URL:-http://proxy:8080}"

      # Logging Configuration
      QUARKUS_LOG_LEVEL: "${QUARKUS_LOG_LEVEL:-INFO}"
      QUARKUS_LOG_CONSOLE_FORMAT: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (%t) %s%e%n"

    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-96M}
        reservations:
          memory: ${MEM_RESERVATION:-32M}

    volumes:
      # Persistent SQLite database
      - app-data:/app/data


    restart: unless-stopped

    # Health check for the Quarkus application
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional: mitmproxy for request/response interception
  # Uncomment to enable proxy features
  proxy:
    image: mitmproxy/mitmproxy:latest
    command: mitmweb --web-host 0.0.0.0 --web-port 8081 --set web_password=admin
    ports:
      - "7080:8080"   # proxy port
      - "7081:8081"   # web UI
    restart: unless-stopped

volumes:
  app-data:
    driver: local
