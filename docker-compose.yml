version: '3.8'

# Docker Compose file for running pre-built Docker image from GitHub Container Registry
# This is for production use - it pulls the image instead of building locally
#
# Usage:
#   docker-compose up                          # Run with defaults
#   docker-compose up -d                       # Run in background
#   JWT_SECRET=xxx SESSION_SECRET=yyy docker-compose up  # With custom secrets
#
# For local development with build, use: docker compose -f docker/docker-compose.yml up

services:
  app:
    # Use pre-built image from GitHub Container Registry
    image: ghcr.io/anasoid/iptv-organizer-proxy:latest
    container_name: iptv-organizer-proxy

    ports:
      - "${APP_PORT:-9090}:8080"
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
