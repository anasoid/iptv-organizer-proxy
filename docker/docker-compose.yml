version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/app.sqlite
      - JWT_SECRET=${JWT_SECRET:-changeme-default-key}
      - SESSION_SECRET=${SESSION_SECRET:-changeme-default-key}
      - CORS_ALLOWED_ORIGINS=*
      - APP_DEBUG=${APP_DEBUG:-false}
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  data:
  logs:
