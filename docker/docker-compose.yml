# Docker Compose for IPTV Organizer Proxy
# Builds and runs the Quarkus Java backend with SQLite database
# Usage: docker-compose up --build

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: iptv-organizer-proxy

    ports:
      - "${APP_PORT:-9090}:8080"

    environment:
      # Quarkus HTTP Configuration
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_HTTP_HOST: 0.0.0.0

      # Database - SQLite (db-kind=other + org.sqlite.JDBC baked in at build time)
      # Override the path here if needed
      QUARKUS_DATASOURCE_DB_KIND: other
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:sqlite:/app/data/app.sqlite"
      QUARKUS_DATASOURCE_USERNAME: ""
      QUARKUS_DATASOURCE_PASSWORD: ""


      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-*}"

      # Application Feature Flags
      SYNC_ENABLED: "${SYNC_ENABLED:-true}"
      SYNC_CHECK_INTERVAL: "${SYNC_CHECK_INTERVAL:-10800}"
      SYNC_LOCK_TIMEOUT: "${SYNC_LOCK_TIMEOUT:-600}"

      # Logging Configuration
      QUARKUS_LOG_LEVEL: "${QUARKUS_LOG_LEVEL:-INFO}"
      QUARKUS_LOG_CONSOLE_FORMAT: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (%t) %s%e%n"

      # Memory and Performance — override JVM flags via JAVA_OPTS (e.g. export JAVA_OPTS="-Xms64m -Xmx512m -XX:+UseG1GC")
      JAVA_OPTS: "- Xms16m -Xmx64m -XX:+UseG1GC "

    volumes:
      # Persistent SQLite database + JWT key pair (generated on first boot)
      - app-data:/app/data
      # Application logs
      - app-logs:/logs

    restart: unless-stopped

    # Health check for the Quarkus application
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
