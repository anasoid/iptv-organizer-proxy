server {
    listen 8080;
    server_name _;
    root /app/public;
    index index.php;

    # Pass the original host and scheme to PHP-FPM for correct redirects
    set $scheme_host $scheme://$http_host;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|json|lock|sql)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(src|vendor|migrations|config|bin|node_modules)/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Admin SPA routing - highest priority, serve files directly without PHP
    location ^~ /admin/ {
        try_files $uri /admin/index.html;
    }

    # Static files - cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PHP-FPM backend
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Increase timeouts for long-running processes
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    # API and default routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Deny access to logs
    location ~ ^/logs/ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
