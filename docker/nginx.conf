user app;
worker_processes auto;
error_log /logs/iptv-nginx-error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay off;
    keepalive_timeout 120;
    types_hash_max_size 2048;
    client_max_body_size 25M;

    # Extended timeouts for 128MB memory disk I/O operations
    client_body_timeout 300;
    client_header_timeout 300;
    send_timeout 300;

    # Gzip compression (limited for 128MB RAM)
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_buffers 4 16k;
    gzip_comp_level 1;

    # Buffer settings for 128MB RAM (aggressive disk spilling)
    # Minimal RAM buffers, responses spill to disk immediately
    proxy_buffer_size 32k;
    proxy_buffers 4 64k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 1024m;
    proxy_temp_file_write_size 256k;

    include /etc/nginx/conf.d/*.conf;
}
