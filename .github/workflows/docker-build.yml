name: Docker Build & Push

on:
  push:
    branches:
      - main
      - develop
      - release/*
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build native binary and arch-specific image on each platform's own runner.
  # Each job compiles the Quarkus native binary natively (no cross-compilation,
  # no QEMU for the compile step) and pushes a platform-tagged image.
  # ──────────────────────────────────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - os: ubuntu-24.04-arm   # GitHub-hosted arm64 runner (free for public repos)
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build admin UI (platform-independent JS build)
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      # build:java compiles TS, runs vite build, and copies dist → back/src/main/resources/META-INF/resources/admin/
      - name: Build admin UI
        working-directory: admin
        run: |
          npm ci
          npm run build:java

      # 3. Setup JDK 21 with Gradle cache
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x back/gradlew

      # 4. Docker Buildx (single-platform per job — no cross-compilation needed)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Login to GHCR (skip on PRs)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Determine image tag
      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG="${GITHUB_REF#refs/heads/}"
          else
            TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # 7. Build and push arch-specific image (push builds only)
      #    Each job produces its own native binary on native hardware, so the
      #    binary arch always matches the image target platform.
      - name: Build and push native image (${{ matrix.arch }})
        if: github.event_name != 'pull_request'
        run: |
          export GRADLE_OPTS="-Xmx2g"
          export DOCKER_BUILDKIT=1
          ./gradlew build \
            -PbuildingNativeImage \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.compression.level=9 \
            "-Dquarkus.native.container-runtime-options=--memory=3g" \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=${{ env.REGISTRY }} \
            -Dquarkus.container-image.group=${{ github.repository_owner }} \
            -Dquarkus.container-image.name=iptv-organizer-proxy \
            "-Dquarkus.container-image.tag=${{ steps.tag.outputs.tag }}-${{ matrix.arch }}" \
            "-Dquarkus.docker.buildx.platform=${{ matrix.platform }}" \
            --no-daemon
        working-directory: back

      # 8. PR: build only (no push), amd64 only to keep CI fast
      - name: Build native image (PR / amd64 verification only)
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64'
        run: |
          export GRADLE_OPTS="-Xmx2g"
          export DOCKER_BUILDKIT=1
          ./gradlew build \
            -PbuildingNativeImage \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.compression.level=9 \
            "-Dquarkus.native.container-runtime-options=--memory=3g" \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=false \
            "-Dquarkus.docker.buildx.platform=${{ matrix.platform }}" \
            --no-daemon
        working-directory: back

  # ──────────────────────────────────────────────────────────────────────────
  # After all arch-specific images are pushed, merge them into a single
  # multi-arch manifest and build the VFS variant.
  # ──────────────────────────────────────────────────────────────────────────
  merge-manifest:
    needs: build-native
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG="${GITHUB_REF#refs/heads/}"
          else
            TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # Combine arch-specific images into a single multi-arch manifest
      - name: Create and push multi-arch manifest
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"

      # Build single-layer VFS variant on top of the merged manifest
      - name: Build and push VFS image
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          VFS_TAG="${BASE}:${TAG}-vfs"
          docker buildx build \
            --file ./docker/Dockerfile.vfs \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE}:${TAG}" \
            --push \
            --tag "${VFS_TAG}" \
            .
