name: Docker Build & Push

on:
  push:
    branches:
      - main
      - develop
      - release/*
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build native binary and arch-specific image on each platform's own runner.
  # Each job compiles the Quarkus native binary natively (no cross-compilation,
  # no QEMU for the compile step) and pushes a platform-tagged image.
  # ──────────────────────────────────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            variant: sqlite
            graalvmVersion: '25'
            fullJdbcDrivers: 'false'
            tagSuffix: ''
            nativeExtraArgs: ''
            useContainerBuild: 'true'
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            variant: full
            graalvmVersion: '25'
            fullJdbcDrivers: 'true'
            tagSuffix: '-full'
            nativeExtraArgs: ''
            useContainerBuild: 'true'
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            variant: openwrt
            graalvmVersion: '25'
            fullJdbcDrivers: 'false'
            tagSuffix: '-openwrt'
            nativeExtraArgs: '-Dquarkus.profile=openwrt'
            useContainerBuild: 'false'
          - os: ubuntu-24.04-arm   # GitHub-hosted arm64 runner (free for public repos)
            platform: linux/arm64
            arch: arm64
            variant: sqlite
            graalvmVersion: '25'
            fullJdbcDrivers: 'false'
            tagSuffix: ''
            nativeExtraArgs: ''
            useContainerBuild: 'true'
          - os: ubuntu-24.04-arm   # GitHub-hosted arm64 runner (free for public repos)
            platform: linux/arm64
            arch: arm64
            variant: full
            graalvmVersion: '25'
            fullJdbcDrivers: 'true'
            tagSuffix: '-full'
            nativeExtraArgs: ''
            useContainerBuild: 'true'
          - os: ubuntu-24.04-arm   # GitHub-hosted arm64 runner (free for public repos)
            platform: linux/arm64
            arch: arm64
            variant: openwrt
            graalvmVersion: '25'
            fullJdbcDrivers: 'false'
            tagSuffix: '-openwrt'
            nativeExtraArgs: '-Dquarkus.profile=openwrt'
            useContainerBuild: 'false'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build admin UI (platform-independent JS build)
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      # build:java compiles TS, runs vite build, and copies dist → back/src/main/resources/META-INF/resources/admin/
      - name: Build admin UI
        working-directory: admin
        run: |
          npm ci
          npm run build:java

      # 3. Setup JDK based on variant:
      #    - Regular builds use Temurin (native-image runs inside the Mandrel container)
      #    - OpenWrt uses GraalVM Community on the runner (container-build disabled, needs native-image locally)
      - name: Setup Temurin JDK ${{ matrix.graalvmVersion }}
        if: matrix.variant != 'openwrt'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '${{ matrix.graalvmVersion }}'
          cache: 'gradle'

      - name: Setup GraalVM Community ${{ matrix.graalvmVersion }} (openwrt musl build)
        if: matrix.variant == 'openwrt'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '${{ matrix.graalvmVersion }}'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'

      # Install musl toolchain on runner for openwrt static build (container-build is disabled for this variant)
      - name: Install musl toolchain (openwrt only)
        if: matrix.variant == 'openwrt'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          # GraalVM looks for <arch>-linux-musl-gcc; musl-tools provides musl-gcc — create the alias
          sudo ln -sf /usr/bin/musl-gcc /usr/bin/$(uname -m)-linux-musl-gcc

      - name: Grant execute permission for gradlew
        run: chmod +x back/gradlew

      # 4. Docker Buildx (single-platform per job — no cross-compilation needed)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Login to GHCR (skip on PRs)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Determine image tag
      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG="${GITHUB_REF#refs/heads/}"
          else
            TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # 7. Build and push arch-specific image (push builds only)
      #    Step 1: compile the native binary (no container-image flags — just produce the runner).
      #    Step 2: build & push the Docker image ourselves so the build context is unambiguous.
      - name: Compile native binary (${{ matrix.arch }} / ${{ matrix.variant }})
        if: github.event_name != 'pull_request'
        run: |
          export GRADLE_OPTS="-Xmx2g"
          NATIVE_XMX_OPT="-DNATIVE_IMAGE_XMX=2300m"
          ./gradlew build \
            -x test \
            -PbuildingNativeImage \
            -PfullJdbcDrivers=${{ matrix.fullJdbcDrivers }} \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false \
            -Dquarkus.native.container-build=${{ matrix.useContainerBuild }} \
            -Dquarkus.native.compression.level=9 \
            "-Dquarkus.native.container-runtime-options=--memory=3g" \
            ${NATIVE_XMX_OPT} \
            ${{ matrix.nativeExtraArgs }} \
            --no-daemon
        working-directory: back

      - name: Build and push Docker image (${{ matrix.arch }} / ${{ matrix.variant }})
        if: github.event_name != 'pull_request'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy:${{ steps.tag.outputs.tag }}${{ matrix.tagSuffix }}-${{ matrix.arch }}"
          echo "=== build context contents ==="
          ls -la back/build/*-runner 2>/dev/null || { echo "ERROR: no *-runner file in back/build/"; exit 1; }
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --file back/src/main/docker/Dockerfile.native \
            --tag "${IMAGE}" \
            --push \
            back/build/

      # 8. PR: build only (no push), amd64 only to keep CI fast
      - name: Compile native binary (PR / amd64 / ${{ matrix.variant }})
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64'
        run: |
          export GRADLE_OPTS="-Xmx2g"
          NATIVE_XMX_OPT="-DNATIVE_IMAGE_XMX=2300m"
          ./gradlew build \
            -x test \
            -PbuildingNativeImage \
            -PfullJdbcDrivers=${{ matrix.fullJdbcDrivers }} \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false \
            -Dquarkus.native.container-build=${{ matrix.useContainerBuild }} \
            -Dquarkus.native.compression.level=9 \
            "-Dquarkus.native.container-runtime-options=--memory=3g" \
            ${NATIVE_XMX_OPT} \
            ${{ matrix.nativeExtraArgs }} \
            --no-daemon
        working-directory: back

      - name: Build Docker image (PR / no push / ${{ matrix.variant }})
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64'
        run: |
          ls -la back/build/*-runner 2>/dev/null || { echo "ERROR: no *-runner file in back/build/"; exit 1; }
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --file back/src/main/docker/Dockerfile.native \
            back/build/

  # ──────────────────────────────────────────────────────────────────────────
  # After all arch-specific images are pushed, merge them into a single
  # multi-arch manifest and build the VFS variant.
  # ──────────────────────────────────────────────────────────────────────────
  merge-manifest:
    needs: build-native
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG="${GITHUB_REF#refs/heads/}"
          else
            TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # Combine arch-specific SQLite-only images into a single multi-arch manifest (no suffix)
      - name: Create and push multi-arch manifest (sqlite / no suffix)
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"

      # Combine arch-specific full-driver images into a single multi-arch manifest (-full suffix)
      - name: Create and push multi-arch manifest (full)
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}-full" \
            "${BASE}:${TAG}-full-amd64" \
            "${BASE}:${TAG}-full-arm64"

      # Combine arch-specific openwrt images into a single multi-arch manifest (-openwrt suffix)
      - name: Create and push multi-arch manifest (openwrt)
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}-openwrt" \
            "${BASE}:${TAG}-openwrt-amd64" \
            "${BASE}:${TAG}-openwrt-arm64"

      # Build single-layer VFS variant on top of the merged manifest
      - name: Build and push VFS image
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          VFS_TAG="${BASE}:${TAG}-vfs"
          docker buildx build \
            --file ./docker/Dockerfile.vfs \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE}:${TAG}" \
            --push \
            --tag "${VFS_TAG}" \
            .

      # Build VFS variant for full-driver image
      - name: Build and push VFS image (full)
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          VFS_TAG="${BASE}:${TAG}-vfs-full"
          docker buildx build \
            --file ./docker/Dockerfile.vfs \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE}:${TAG}-full" \
            --push \
            --tag "${VFS_TAG}" \
            .

      # Build VFS variant for openwrt image
      - name: Build and push VFS image (openwrt)
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          VFS_TAG="${BASE}:${TAG}-vfs-openwrt"
          docker buildx build \
            --file ./docker/Dockerfile.vfs \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE}:${TAG}-openwrt" \
            --push \
            --tag "${VFS_TAG}" \
            .

