name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - devlop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - devlop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build admin UI
        working-directory: ./admin
        run: |
          npm install
          VITE_BASE_PATH=/admin/ npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./docker/Dockerfile
          # Build for multiple architectures
          # - linux/amd64: Servers, desktops, cloud platforms
          # - linux/arm64: Modern routers, Raspberry Pi 4+, ARM servers
          # Uses apk --no-scripts to work around QEMU post-install script issues
          platforms: |
            linux/amd64
            linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate VFS tags
        if: github.event_name != 'pull_request'
        id: vfs-tags
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          VFS_TAGS=$(echo "$TAGS" | sed 's/$/-vfs/')
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$VFS_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push VFS image for ARM and AMD (single layer)
        if: github.event_name != 'pull_request'
        run: |
          VFS_TAGS="${{ steps.vfs-tags.outputs.tags }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            TAG_ARGS="$TAG_ARGS --tag $tag"
          done <<< "$VFS_TAGS"
          docker buildx build \
            --file ./docker/Dockerfile \
            --platform linux/amd64,linux/arm64 \
            --squash \
            --push \
            $TAG_ARGS \
            .

  test:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PHP linter
        working-directory: ./back
        run: |
          php -l public/index.php
          php -l bootstrap.php
          find src -name "*.php" -type f -exec php -l {} \;

      - name: Check composer.json validity
        working-directory: ./back
        run: composer validate --strict

  security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
