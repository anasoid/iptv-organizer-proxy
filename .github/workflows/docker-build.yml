name: Docker Build & Push

on:
  push:
    branches:
      - main
      - develop
      - release/*
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build native binary and arch-specific image on each platform's own runner.
  # Each job compiles the Quarkus native binary natively (no cross-compilation,
  # no QEMU for the compile step) and pushes a platform-tagged image.
  # ──────────────────────────────────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            variant: sqlite
            graalvmVersion: '25'
            fullJdbcDrivers: 'false'
            tagSuffix: ''
            nativeExtraArgs: ''
            useContainerBuild: 'true'
          - os: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            variant: full
            graalvmVersion: '25'
            fullJdbcDrivers: 'true'
            tagSuffix: '-full'
            nativeExtraArgs: ''
            useContainerBuild: 'true'
          - os: ubuntu-24.04-arm   # GitHub-hosted arm64 runner (free for public repos)
            platform: linux/arm64
            arch: arm64
            variant: sqlite
            graalvmVersion: '25'
            fullJdbcDrivers: 'false'
            tagSuffix: ''
            nativeExtraArgs: ''
            useContainerBuild: 'true'
          - os: ubuntu-24.04-arm   # GitHub-hosted arm64 runner (free for public repos)
            platform: linux/arm64
            arch: arm64
            variant: full
            graalvmVersion: '25'
            fullJdbcDrivers: 'true'
            tagSuffix: '-full'
            nativeExtraArgs: ''
            useContainerBuild: 'true'
          - os: ubuntu-24.04-arm   # GitHub-hosted arm64 runner (free for public repos)
            platform: linux/arm64
            arch: arm64
            variant: openwrt
            graalvmVersion: '25'
            fullJdbcDrivers: 'false'
            tagSuffix: '-openwrt'
            nativeExtraArgs: '-Dquarkus.profile=openwrt'
            useContainerBuild: 'false'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build admin UI (platform-independent JS build)
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      # build:java compiles TS, runs vite build, and copies dist → back/src/main/resources/META-INF/resources/admin/
      - name: Build admin UI
        working-directory: admin
        run: |
          npm ci
          npm run build:java

      # 3. Setup JDK based on variant:
      #    - Regular builds use Temurin (native-image runs inside the Mandrel container)
      #    - OpenWrt uses Oracle GraalVM on the runner (container-build disabled, needs native-image locally)
      #      Oracle GraalVM is required: Community Edition lacks aarch64 musl static-image support.
      - name: Setup Temurin JDK ${{ matrix.graalvmVersion }}
        if: matrix.variant != 'openwrt'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '${{ matrix.graalvmVersion }}'
          cache: 'gradle'

      - name: Setup Oracle GraalVM ${{ matrix.graalvmVersion }} (openwrt musl build)
        if: matrix.variant == 'openwrt'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '${{ matrix.graalvmVersion }}'
          distribution: 'graalvm'           # Oracle GraalVM supports aarch64 musl; Community Edition does not
          architecture: 'aarch64'           # OpenWrt variant runs on arm64 runner
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'

      - name: Check OpenWrt musl static support
        id: openwrt-support
        if: matrix.variant == 'openwrt'
        run: |
          set -euo pipefail
          GRAAL_HOME="${GRAALVM_HOME:-${JAVA_HOME:-}}"
          if [ -z "$GRAAL_HOME" ]; then
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::warning::OpenWrt build skipped: GRAALVM_HOME/JAVA_HOME is not set"
            exit 0
          fi

          MUSL_DIR="$GRAAL_HOME/lib/static/linux-aarch64/musl"
          MISSING=0
          for lib in libjava.a libnio.a libnet.a; do
            if [ ! -f "$MUSL_DIR/$lib" ]; then
              echo "missing: $MUSL_DIR/$lib"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 0 ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
            echo "OpenWrt musl static support detected at: $MUSL_DIR"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::warning::OpenWrt build skipped: GraalVM musl static libraries are not available on this runner/toolchain"
          fi

      - name: Install musl toolchain (openwrt)
        if: matrix.variant == 'openwrt'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools musl-dev zlib1g-dev
          # GraalVM may query arch-specific musl compiler names; Ubuntu only ships musl-gcc.
          # Create both aliases safely so toolchain discovery remains stable.
          MUSL_GCC="$(command -v musl-gcc)"
          sudo ln -sf "$MUSL_GCC" /usr/local/bin/aarch64-linux-musl-gcc
          sudo ln -sf "$MUSL_GCC" /usr/local/bin/x86_64-linux-musl-gcc
          # Make static zlib available in the musl library directory for static linking
          RUNNER_ARCH="$(uname -m)"
          if [ "$RUNNER_ARCH" = "aarch64" ]; then
            MUSL_LIB="/usr/lib/aarch64-linux-musl"
          else
            MUSL_LIB="/usr/lib/x86_64-linux-musl"
          fi
          sudo mkdir -p "$MUSL_LIB"
          if [ "$RUNNER_ARCH" = "aarch64" ]; then
            ZLIB_A="$(find /usr/lib/aarch64-linux-gnu -name 'libz.a' 2>/dev/null | head -1)"
          else
            ZLIB_A="$(find /usr/lib/x86_64-linux-gnu -name 'libz.a' 2>/dev/null | head -1)"
          fi
          if [ -n "$ZLIB_A" ] && [ ! -f "$MUSL_LIB/libz.a" ]; then
            sudo ln -s "$ZLIB_A" "$MUSL_LIB/libz.a"
          fi

      - name: Validate musl compiler (openwrt)
        if: matrix.variant == 'openwrt'
        run: |
          echo "runner arch: $(uname -m)"
          command -v musl-gcc
          command -v aarch64-linux-musl-gcc
          command -v x86_64-linux-musl-gcc
          aarch64-linux-musl-gcc -v || true
          x86_64-linux-musl-gcc -v || true
          ls -la /usr/lib/aarch64-linux-musl/libz.a 2>/dev/null || echo "WARNING: libz.a not found in /usr/lib/aarch64-linux-musl"
          ls -la /usr/lib/x86_64-linux-musl/libz.a 2>/dev/null || echo "WARNING: libz.a not found in /usr/lib/x86_64-linux-musl"

      - name: Grant execute permission for gradlew
        run: chmod +x back/gradlew

      # 4. Docker Buildx (single-platform per job — no cross-compilation needed)
      - name: Warm pull BuildKit image (retry)
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if docker pull "${{ env.BUILDKIT_IMAGE }}"; then
              exit 0
            fi
            echo "BuildKit pull failed (attempt ${i}/3), retrying..."
            sleep $((i * 10))
          done
          echo "Failed to pull ${{ env.BUILDKIT_IMAGE }} after retries"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}

      # 5. Login to GHCR (skip on PRs)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Determine image tag
      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG="${GITHUB_REF#refs/heads/}"
          else
            TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # 7. Build and push arch-specific image (push builds only)
      #    Step 1: compile the native binary (no container-image flags — just produce the runner).
      #    Step 2: build & push the Docker image ourselves so the build context is unambiguous.
      - name: Compile native binary (${{ matrix.arch }} / ${{ matrix.variant }})
        if: github.event_name != 'pull_request' && (matrix.variant != 'openwrt' || steps.openwrt-support.outputs.supported == 'true')
        run: |
          export GRADLE_OPTS="-Xmx2g"
          NATIVE_XMX_OPT="-DNATIVE_IMAGE_XMX=2300m"
          if [[ "${{ matrix.variant }}" == "openwrt" ]]; then
            # Force compiler path explicitly to avoid GraalVM toolchain auto-detection ambiguity.
            export CC="/usr/local/bin/aarch64-linux-musl-gcc"
          fi
          ./gradlew build \
            -x test \
            -PbuildingNativeImage \
            -PfullJdbcDrivers=${{ matrix.fullJdbcDrivers }} \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false \
            -Dquarkus.native.container-build=${{ matrix.useContainerBuild }} \
            -Dquarkus.native.compression.level=9 \
            "-Dquarkus.native.container-runtime-options=--memory=3g" \
            ${NATIVE_XMX_OPT} \
            ${{ matrix.nativeExtraArgs }} \
            --no-daemon
        working-directory: back

      - name: Build and push Docker image (${{ matrix.arch }} / ${{ matrix.variant }})
        if: github.event_name != 'pull_request' && (matrix.variant != 'openwrt' || steps.openwrt-support.outputs.supported == 'true')
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy:${{ steps.tag.outputs.tag }}${{ matrix.tagSuffix }}-${{ matrix.arch }}"
          echo "=== build context contents ==="
          ls -la back/build/*-runner 2>/dev/null || { echo "ERROR: no *-runner file in back/build/"; exit 1; }
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --file back/src/main/docker/Dockerfile.native \
            --tag "${IMAGE}" \
            --push \
            back/build/

      - name: OpenWrt build skipped notice
        if: github.event_name != 'pull_request' && matrix.variant == 'openwrt' && steps.openwrt-support.outputs.supported != 'true'
        run: |
          echo "::warning::Skipping OpenWrt arm64 image build because this GraalVM toolchain does not provide aarch64 musl static libraries"

      # 8. PR: build only (no push), amd64 only to keep CI fast
      - name: Compile native binary (PR / amd64 / ${{ matrix.variant }})
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64' && matrix.variant != 'openwrt'
        run: |
          export GRADLE_OPTS="-Xmx2g"
          NATIVE_XMX_OPT="-DNATIVE_IMAGE_XMX=2300m"
          ./gradlew build \
            -x test \
            -PbuildingNativeImage \
            -PfullJdbcDrivers=${{ matrix.fullJdbcDrivers }} \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false \
            -Dquarkus.native.container-build=${{ matrix.useContainerBuild }} \
            -Dquarkus.native.compression.level=9 \
            "-Dquarkus.native.container-runtime-options=--memory=3g" \
            ${NATIVE_XMX_OPT} \
            ${{ matrix.nativeExtraArgs }} \
            --no-daemon
        working-directory: back

      - name: Build Docker image (PR / no push / ${{ matrix.variant }})
        if: github.event_name == 'pull_request' && matrix.arch == 'amd64'
        run: |
          ls -la back/build/*-runner 2>/dev/null || { echo "ERROR: no *-runner file in back/build/"; exit 1; }
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --file back/src/main/docker/Dockerfile.native \
            back/build/

  # ──────────────────────────────────────────────────────────────────────────
  # After all arch-specific images are pushed, merge them into a single
  # multi-arch manifest and build the VFS variant.
  # ──────────────────────────────────────────────────────────────────────────
  merge-manifest:
    needs: build-native
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Warm pull BuildKit image (retry)
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if docker pull "${{ env.BUILDKIT_IMAGE }}"; then
              exit 0
            fi
            echo "BuildKit pull failed (attempt ${i}/3), retrying..."
            sleep $((i * 10))
          done
          echo "Failed to pull ${{ env.BUILDKIT_IMAGE }} after retries"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG="${GITHUB_REF#refs/heads/}"
          else
            TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Check OpenWrt arm64 image availability
        id: openwrt-image-check
        run: |
          set -euo pipefail
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          if docker buildx imagetools inspect "${BASE}:${TAG}-openwrt-arm64" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::OpenWrt image not found; skipping openwrt manifest and vfs-openwrt publish"
          fi

      # Combine arch-specific SQLite-only images into a single multi-arch manifest (no suffix)
      - name: Create and push multi-arch manifest (sqlite / no suffix)
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"

      # Combine arch-specific full-driver images into a single multi-arch manifest (-full suffix)
      - name: Create and push multi-arch manifest (full)
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}-full" \
            "${BASE}:${TAG}-full-amd64" \
            "${BASE}:${TAG}-full-arm64"

      # Combine arch-specific openwrt images into a single multi-arch manifest (-openwrt suffix)
      - name: Create and push multi-arch manifest (openwrt)
        if: steps.openwrt-image-check.outputs.available == 'true'
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}-openwrt" \
            "${BASE}:${TAG}-openwrt-arm64"

      # Build single-layer VFS variant on top of the merged manifest
      - name: Build and push VFS image
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          VFS_TAG="${BASE}:${TAG}-vfs"
          docker buildx build \
            --file ./docker/Dockerfile.vfs \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE}:${TAG}" \
            --push \
            --tag "${VFS_TAG}" \
            .

      # Build VFS variant for full-driver image
      - name: Build and push VFS image (full)
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          VFS_TAG="${BASE}:${TAG}-vfs-full"
          docker buildx build \
            --file ./docker/Dockerfile.vfs \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE}:${TAG}-full" \
            --push \
            --tag "${VFS_TAG}" \
            .

      # Build VFS variant for openwrt image
      - name: Build and push VFS image (openwrt)
        if: steps.openwrt-image-check.outputs.available == 'true'
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          VFS_TAG="${BASE}:${TAG}-vfs-openwrt"
          docker buildx build \
            --file ./docker/Dockerfile.vfs \
            --platform linux/arm64 \
            --build-arg BASE_IMAGE="${BASE}:${TAG}-openwrt" \
            --push \
            --tag "${VFS_TAG}" \
            .

