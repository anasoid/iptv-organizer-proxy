name: Docker Build & Push

on:
  push:
    branches:
      - main
      - develop
      - release/*
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: sqlite
            fullJdbcDrivers: 'false'
            tagSuffix: ''
          - variant: full
            fullJdbcDrivers: 'true'
            tagSuffix: '-full'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Admin UI (platform-independent)
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Build admin UI
        working-directory: admin
        run: |
          npm ci
          npm run build:java

      # 3. Java / Gradle
      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x back/gradlew

      # 4. Docker infra — QEMU needed for arm64 cross-compilation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Registry login (skip on PRs)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Resolve image tag
      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == refs/heads/* ]]; then
            TAG="${GITHUB_REF#refs/heads/}"
          else
            TAG="pr-${{ github.event.pull_request.number }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # ── amd64 ──────────────────────────────────────────────────────────────
      - name: Compile native binary (amd64 / ${{ matrix.variant }})
        run: |
          export GRADLE_OPTS="-Xmx2g"
          ./gradlew build \
            -x test \
            -PbuildingNativeImage \
            -PfullJdbcDrivers=${{ matrix.fullJdbcDrivers }} \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.compression.level=9 \
            "-Dquarkus.native.container-runtime-options=--memory=3g" \
            -DNATIVE_IMAGE_XMX=2300m \
            --no-daemon
        working-directory: back

      - name: Build & push amd64 image by digest (${{ matrix.variant }})
        if: github.event_name != 'pull_request'
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          ls -la back/build/*-runner || { echo "ERROR: no runner binary"; exit 1; }
          docker buildx build \
            --platform linux/amd64 \
            --file back/src/main/docker/Dockerfile.native \
            --output "type=image,name=${BASE},push-by-digest=true,push=true" \
            --metadata-file /tmp/amd64-meta.json \
            back/build/
          echo "AMD64_DIGEST=$(jq -r '."containerimage.digest"' /tmp/amd64-meta.json)" >> $GITHUB_ENV

      - name: Build Docker image (PR / amd64 / no push / ${{ matrix.variant }})
        if: github.event_name == 'pull_request'
        run: |
          ls -la back/build/*-runner || { echo "ERROR: no runner binary"; exit 1; }
          docker buildx build \
            --platform linux/amd64 \
            --file back/src/main/docker/Dockerfile.native \
            back/build/

      # ── arm64 (push builds only — QEMU via container-build platform flag) ──
      - name: Compile native binary (arm64 / ${{ matrix.variant }})
        if: github.event_name != 'pull_request'
        run: |
          export GRADLE_OPTS="-Xmx2g"
          ./gradlew clean build \
            -x test \
            -PbuildingNativeImage \
            -PfullJdbcDrivers=${{ matrix.fullJdbcDrivers }} \
            -Dquarkus.native.enabled=true \
            -Dquarkus.package.jar.enabled=false \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.compression.level=9 \
            "-Dquarkus.native.container-runtime-options=--platform linux/arm64 --memory=3g" \
            -DNATIVE_IMAGE_XMX=2300m \
            --no-daemon
        working-directory: back

      - name: Build & push arm64 image by digest (${{ matrix.variant }})
        if: github.event_name != 'pull_request'
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          ls -la back/build/*-runner || { echo "ERROR: no runner binary"; exit 1; }
          docker buildx build \
            --platform linux/arm64 \
            --file back/src/main/docker/Dockerfile.native \
            --output "type=image,name=${BASE},push-by-digest=true,push=true" \
            --metadata-file /tmp/arm64-meta.json \
            back/build/
          echo "ARM64_DIGEST=$(jq -r '."containerimage.digest"' /tmp/arm64-meta.json)" >> $GITHUB_ENV

      # ── Multi-arch manifest ────────────────────────────────────────────────
      - name: Create and push multi-arch manifest (${{ matrix.variant }})
        if: github.event_name != 'pull_request'
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}${{ matrix.tagSuffix }}" \
            "${BASE}@${AMD64_DIGEST}" \
            "${BASE}@${ARM64_DIGEST}"

      # ── VFS variant — only for the default (sqlite) image ─────────────────
      - name: Build and push VFS image
        if: github.event_name != 'pull_request' && matrix.variant == 'sqlite'
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/iptv-organizer-proxy"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx build \
            --file ./docker/Dockerfile.vfs \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE}:${TAG}" \
            --push \
            --tag "${BASE}:${TAG}-vfs" \
            .

