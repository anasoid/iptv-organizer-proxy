name: Java CI

on: [ push, pull_request ]

jobs:
  test-java:
    name: Test Java (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: ["21"]
      fail-fast: false

    defaults:
      run:
        working-directory: back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Generate JaCoCo report
        if: always()
        run: ./gradlew jacocoTestReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk-${{ matrix.java-version }}
          path: |
            back/build/test-results/test/*.xml
            back/build/reports/tests/test/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-jdk-${{ matrix.java-version }}
          path: back/build/reports/jacoco/test/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.java-version == '21'
        uses: codecov/codecov-action@v4
        with:
          files: ./back/build/reports/jacoco/test/jacocoTestReport.xml
          flags: java
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
