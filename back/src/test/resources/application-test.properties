# Test Database Configuration - SQLite In-Memory
quarkus.datasource.devservices.enabled=true
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite::memory:
quarkus.datasource.username=
quarkus.datasource.password=

# Disable automatic connection test
quarkus.datasource.jdbc.enable-validation=false

# Flyway migrations (if using)
quarkus.flyway.migrate-at-start=false

# Logging
quarkus.log.level=WARN
quarkus.log.category."io.quarkus.test".level=WARN
quarkus.log.category."io.vertx.sqlclient".level=WARN

# JWT Configuration (same as production)
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=iptv-organizer
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem
smallrye.jwt.new-token.issuer=iptv-organizer
smallrye.jwt.new-token.lifespan=28800
