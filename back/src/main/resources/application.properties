# Application Configuration
quarkus.application.name=iptv-organizer-proxy
quarkus.http.port=8080
# Database Configuration
# db-kind=other allows any JDBC driver (build-time property, must be top-level)
# Driver class must also be declared at build time so Quarkus includes it in the fast-jar
quarkus.datasource.jdbc.min-size=1
# Reduce JDBC_MAX_POOL_SIZE on low-memory devices (e.g. OpenWrt): each idle connection
# holds its own SQLite page cache (see cache_size below). Default 5 is fine for normal use;
# set to 2 on a router/embedded device.
quarkus.datasource.jdbc.max-size=${JDBC_MAX_POOL_SIZE:5}
quarkus.datasource.jdbc.idle-removal-interval=10s
quarkus.datasource.jdbc.acquisition-timeout=5s
#SQLITE
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:./db/app.sqlite
quarkus.datasource.username=
quarkus.datasource.password=
app.datasource.dialect=sqlite
# ---------------------------------------------------------------------------
# SQLite memory tuning ? critical for low-memory devices (OpenWrt / routers)
# These are passed as JDBC connection properties; xerial SQLite-JDBC applies
# them as PRAGMA statements on every new connection.
# ---------------------------------------------------------------------------
# Page-cache size per connection.  Negative = KiB; -2000 = 2 MiB (SQLite default).
# For OpenWrt set SQLITE_CACHE_SIZE=-1000 (1 MiB) or -500 (512 KiB).
quarkus.datasource.jdbc.additional-jdbc-properties.cache_size=${SQLITE_CACHE_SIZE:-2000}
# Store temporary tables/indices on disk instead of in memory.
quarkus.datasource.jdbc.additional-jdbc-properties.temp_store=FILE
# DELETE journal uses less memory than WAL (no shared-memory file, no wal-index).
# Switch back to WAL if write concurrency becomes a concern.
quarkus.datasource.jdbc.additional-jdbc-properties.journal_mode=DELETE
# NORMAL durability is sufficient for this workload and faster than FULL.
quarkus.datasource.jdbc.additional-jdbc-properties.synchronous=NORMAL
# Default (dev): override URL/credentials for local MySQL
%dev.quarkus.datasource.jdbc.driver=com.mysql.cj.jdbc.Driver
%dev.quarkus.datasource.db-kind=mysql
%dev.quarkus.datasource.username=root
%dev.quarkus.datasource.password=pass
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/iptv_organizer
%dev.app.datasource.dialect=mysql
# Dialect used by SimpleMigrator (default: sqlite for prod/docker)
# Logging
quarkus.log.level=INFO
quarkus.log.category."org.anasoid.iptvorganizer".level=INFO
#quarkus.log.category."org.anasoid.iptvorganizer.utils.streaming.ReactiveInputStream".level=FINE
#quarkus.log.category."org.anasoid.iptvorganizer.utils.streaming.HttpStreamingService".level=FINE
#quarkus.log.category."org.anasoid.iptvorganizer.utils.streaming.StreamingJsonParser".level=FINE
# HTTP Access Log
# Pattern: client-ip - user [timestamp] "METHOD /path PROTO" status bytes response-time
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h - %u [%t] "%r" %s %b %Dms
# Exclude noisy health-check endpoint
quarkus.http.access-log.exclude-pattern=/health.*
# Native Image Configuration
quarkus.native.enable-http-url-handler=true
quarkus.native.enable-https-url-handler=true
quarkus.native.resources.includes=db/migration/*.sql
# Security
# HTTP Client Configuration
http.client.max-pool-size=5
http.client.connect-timeout=10000
http.client.idle-timeout=60
http.client.max-redirects=5
# Sync Service Configuration
sync.check.interval=60m
# Batch size for synchronization operations (trade-off: memory vs performance)
# Each batch is processed in a single transaction using bulk SELECT + individual INSERT/UPDATE
# Default 1000 = ~1000 transactions for 100k items (vs 200k individual autocommit ops)
# Reduce to 500 for lower memory, increase to 1000+ for better performance
sync.batch.size=100
sync.request.timeout=30
# JWT Configuration
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=iptv-organizer
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem
smallrye.jwt.new-token.issuer=iptv-organizer
smallrye.jwt.new-token.lifespan=28800
# CORS Configuration (allow admin UI)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.access-control-max-age=24H
# Xtream API Configuration
xtream.api.pagination.limit=10000
xtream.api.default.password=
# Stream proxy configuration
stream.disable.proxy=false
stream.follow.location=true
# JVM Metrics monitoring (in-memory ring buffer, collected every minute)
# Maximum number of snapshots to retain (1440 = 24 h at 1/min)
jvm.metrics.max.size=1440
# Drop entries older than this many hours regardless of the size cap
jvm.metrics.max.age.hours=168
# Watch history (in-memory per client)
# Maximum number of history entries per client (0 = disabled)
history.max.size=1000
# Window in minutes: if the same stream is accessed again within this window,
# the existing entry's end time is updated instead of creating a new entry
history.update.window.minutes=5
stream.proxy.timeout=600
stream.connection.timeout=15
# XMLTV configuration
xmltv.use.redirect=false
# HTTP Server Configuration - for handling streaming responses
quarkus.http.read-timeout=300s
quarkus.http.idle-timeout=300s
quarkus.vertx.max-event-loop-execute-time=30s
# Security - paths that require authentication
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.xtream.paths=/player_api.php,/xmltv.php,/live/*,/movie/*,/series/*,/proxy/*
quarkus.http.auth.permission.xtream.policy=permit
quarkus.http.auth.permission.public.paths=/api/auth/login,/health,/admin/*
quarkus.http.auth.permission.public.policy=permit
# Memory Configuration for Docker/Production
# JVM heap is controlled at runtime via JAVA_OPTS (e.g. -Xms32m -Xmx64m) or
# the Docker entrypoint (JAVA_OPTS_APPEND env var in Quarkus JVM images).
# There are no quarkus.jvm.* heap properties ? use JVM args directly.
# Container image configuration (build/push disabled by default; CI overrides via -D flags)
quarkus.container-image.build=false
quarkus.container-image.push=false
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=anasoid
quarkus.container-image.name=iptv-organizer-proxy
quarkus.container-image.tag=java-latest
# Multi-platform build (requires Docker Buildx)
quarkus.docker.buildx.platform=linux/amd64,linux/arm64,linux/arm/v7
# Native build configuration
quarkus.native.container-build=true
quarkus.native.container-runtime=docker
quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-21
# Native build optimizations for memory efficiency + OpenWrt embedded deployment
# Options:
#   --gc=serial - single-threaded GC (lower memory usage during build)
#   -march=compatibility - support ARM/ARM64/x86 architectures for routers
#   -J-Xmx2800m - limit native-image compiler JVM to 2.8GB (CRITICAL for GitHub Actions)
#   --initialize-at-run-time - defer HTTP client init (prevents "found in image heap" error)
#     One entry per class to avoid SmallRye Config \, escaping issues (classes as separate args)
quarkus.native.additional-build-args=\
  --gc=serial,\
  -march=compatibility,\
  -J-Xmx2800m,\
  --initialize-at-run-time=java.net.http,\
  --initialize-at-run-time=org.anasoid.iptvorganizer.utils.proxy.HttpClientFactory,\
  --initialize-at-run-time=org.anasoid.iptvorganizer.utils.streaming.HttpStreamingService,\
  --initialize-at-run-time=org.anasoid.iptvorganizer.utils.streaming.StreamProxyHttpClient,\
  --initialize-at-run-time=org.anasoid.iptvorganizer.utils.proxy.CustomProxySelector,\
  --initialize-at-run-time=org.anasoid.iptvorganizer.utils.proxy.ProxyAuthenticator

# Exception Handling Configuration
%dev.app.exception.include-stacktrace=true
%test.app.exception.include-stacktrace=true
%prod.app.exception.include-stacktrace=false
