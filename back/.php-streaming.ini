; PHP Configuration for Stream Proxy
; Use with: php -c .php-streaming.ini -S localhost:8080 -t public router.php

; Disable output buffering for streaming
output_buffering = 0
zlib.output_compression = 0

; Allow unlimited execution time for long streams
max_execution_time = 0
default_socket_timeout = 0

; Increase memory limit for large streams
memory_limit = 256M

; Disable implicit flush for maximum control
implicit_flush = 0

; Set error reporting
display_errors = 1
error_reporting = E_ALL

; Increase buffer size
realpath_cache_size = 256K

; Log errors to PHP error log
log_errors = 1

; Additional streaming optimizations
expose_php = 0
enable_dl = 0
